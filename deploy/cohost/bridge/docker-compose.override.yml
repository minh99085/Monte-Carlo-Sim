# docker-compose.override.yml — installed into the Robinhood plugin dir by
# Monte-Carlo-Sim's deploy/cohost/install-robinhood.sh. Docker Compose merges
# this with the plugin's own docker-compose.yml automatically.
#
# Adds the Monte-Carlo-Sim → Robinhood paper bridge behind its own
# `mc-bridge` profile, so the bot's standalone deployments are unaffected:
#
#   docker compose --profile robinhood --profile mc-bridge up -d
#
# Phase 1 makes NO Robinhood calls: the bridge maps MC verdict files through
# the local safety gates and writes a paper ledger to
# /data/mc_bridge_ledger.jsonl. Source of truth for the bridge code is the
# Monte-Carlo-Sim repo (deploy/cohost/bridge/), copied in at install time.
services:
  hermes-mc-bridge:
    profiles: ["mc-bridge"]
    build: .
    container_name: hermes-mc-bridge
    volumes:
      - rh_data:/data
      - ${MC_OUTPUTS_DIR:-/opt/monte-carlo-sim/outputs}:/mc-outputs:ro
    env_file:
      - .env
    environment:
      RH_DATA_DIR: "/data"
      MC_VERDICTS_DIRS: "/mc-outputs/verdicts:/mc-outputs/paper_verdicts"
    command: python scripts/run_mc_bridge.py
    restart: unless-stopped
